<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Guardias MIR</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-overlay">

  <div class="login-card">
    <h2>Guardias MIR</h2>

    <p>¿Eres el administrador de este mes?</p>

    <hr>

    <h3>Usuario normal</h3>
    <input id="userNameLogin" placeholder="Tu nombre">
    <button onclick="loginUser()" style="background:#1890ff; font-weight:bold;">
  Entrar como usuario
</button>

    <hr>

    <h3>Administrador</h3>
    <input id="adminNameLogin" placeholder="Nombre admin">
    <button onclick="loginAdmin()">Entrar como administrador</button>

  </div>

</div>

<!-- TOP BAR -->
<div id="topBar" class="topbar hidden">
  <span id="roleBadge"></span>
  <button onclick="logout()">Cerrar sesión</button>
  <div id="devPanel" class="hidden">
  <button onclick="switchUser('user1')">Ana</button>
  <button onclick="switchUser('user2')">Luis</button>
  <button onclick="switchUser('user3')">Marta (Admin)</button>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="container">

    <div class="calendar">
      <h2 id="monthTitle"></h2>
      <div id="calendarGrid"></div>
    </div>

    <div class="sidebar">

      <h3>Proponer guardias</h3>

      <input id="name" disabled>

      <select id="level">
        <option>R1</option>
        <option>R2</option>
        <option>R3</option>
        <option>R4</option>
      </select>

      <input id="numShifts" type="number" min="2" max="4" value="2">

      <input id="days" placeholder="1,5,12">

      <button onclick="submitProposal()">Enviar propuesta</button>

      <hr>

      <button id="resetBtn" onclick="resetMonth()">Reset mes</button>
      <button id="restoreBtn" onclick="restoreMonth()">Restaurar mes</button>

      <h3>Usuarios</h3>
      <div id="userList"></div>

    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
