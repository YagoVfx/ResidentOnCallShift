<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Guardias MIR</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="loginScreen" class="login">
  <h2>Guardias MIR</h2>

  <button onclick="enterUser()">Entrar como usuario</button>

  <hr>

  <input id="adminLoginName" placeholder="Nombre admin (R3 o R4)">
  <button onclick="enterAdmin()">Entrar como administrador</button>
</div>

<div class="container">
  
  <!-- CALENDARIO -->
  <div class="calendar">
    <h2 id="monthTitle"></h2>
    <div id="calendarGrid"></div>
  </div>

  <!-- PANEL DERECHO -->
  <div class="sidebar">
    <h3>Proponer guardias</h3>

    <label>Nombre</label>
    <input id="name" placeholder="Ej: Juan">

    <label>Nivel</label>
    <select id="level">
      <option>R1</option>
      <option>R2</option>
      <option>R3</option>
      <option>R4</option>
    </select>

    <label>Nº guardias</label>
    <input id="numShifts" type="number" min="2" max="4" value="2">

    <label>Días (separados por coma)</label>
    <input id="days" placeholder="1,5,12">

    <button onclick="submitProposal()">Enviar propuesta</button>
	
	<hr>

	<button onclick="resetMonth()">Reset mes</button>

	<h3>Modo administrador</h3>
	<input id="adminName" placeholder="Tu nombre (R3)">
	<button onclick="setAdmin()">Entrar como admin</button>

	<div id="adminPanel" style="display:none;">
	  <button onclick="confirmAll()">Confirmar mes (verde)</button>
	</div>

    <h3>Usuarios</h3>
    <div id="userList"></div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
